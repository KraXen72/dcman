[pytest]
testpaths = tests
addopts = --basetemp=.pytest-tmp
markers =
    unit: fast tests with no external binaries
    cli: tests that run CLI flows with faked binaries/subprocesses
    contract: tests that validate devcontainer template/feature contracts
    e2e_engine: tests that require a real container engine (opt-in)
filterwarnings =
    ignore:.*containers/storage.*:pytest.PytestWarning
